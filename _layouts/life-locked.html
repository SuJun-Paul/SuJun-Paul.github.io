---
layout: default
---

<article class="px-1">
  <h1 data-toc-skip>🔒 보안이 설정된 글입니다.</h1>
  
  <div id="lock-box" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; max-width: 400px;">
    <p><strong>비밀번호를 입력하세요.</strong></p>
    <input type="password" id="pass" placeholder="비밀번호" style="width: 100%; padding: 8px; margin-bottom: 10px;">
    <button onclick="verify()" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">확인</button>
    <p id="fail" style="color: red; display: none; margin-top: 10px;">❌ 비밀번호가 틀렸습니다.</p>
  </div>

  <div id="real-content" style="display: none;">
    <div class="mt-4 content">{{ content }}</div>
  </div>

  <script>
    function verify() {
      if (document.getElementById('pass').value === "1234") {
        document.getElementById('lock-box').style.display = 'none';
        document.getElementById('real-content').style.display = 'block';
      } else {
        document.getElementById('fail').style.display = 'block';
      }
    }
  </script>
</article>
