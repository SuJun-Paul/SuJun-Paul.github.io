---
layout: default
---

<article class="px-1">
  <h1 data-toc-skip>🔒 보안이 설정된 글입니다.</h1>
  
  <div id="password-container" style="margin-top: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; max-width: 400px;">
    <p><strong>Life 카테고리 접근 비밀번호를 입력하세요.</strong></p>
    <input type="password" id="pass-input" placeholder="비밀번호를 입력하세요" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #bbb; border-radius: 4px;">
    <button onclick="checkPassword()" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">확인</button>
    <p id="error-msg" style="color: red; margin-top: 10px; display: none;">❌ 비밀번호가 틀렸습니다.</p>
  </div>

  <script>
    function checkPassword() {
      const inputVal = document.getElementById('pass-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      // 설정할 비밀번호 "1234"
      if (inputVal === "1234") {
        // 인증 성공 시 브라우저 세션(기억)에 인증 완료 티켓을 남깁니다.
        sessionStorage.setItem("auth_first-start", "verified");
        
        // 현재 페이지를 새로고침하여 본문을 보여줍니다.
        location.reload();
      } else {
        errorMsg.style.display = 'block';
      }
    }

    // 페이지가 로드될 때 이미 인증된 상태인지 체크하는 로직
    document.addEventListener("DOMContentLoaded", function() {
      // 만약 'first-start' 글에 대한 인증 티켓이 있다면 입력창을 숨기고 본문을 바로 보여줍니다.
      if (sessionStorage.getItem("auth_first-start") === "verified") {
        document.getElementById('password-container').style.display = 'none';
        // 지킬 본문({{ content }})이 정상적으로 렌더링되도록 처리
      } else {
        // 인증되지 않았다면 본문 영역을 강제로 숨깁니다.
        // (단, 지킬 렌더링 특성상 소스보기 등에서는 보일 수 있으나 일반적인 접근은 완벽히 차단됩니다.)
      }
    });
  </script>

  <script>
    if (sessionStorage.getItem("auth_first-start") === "verified") {
      document.write('<div class="mt-4 content">{{ content }}</div>');
    }
  </script>
</article>
